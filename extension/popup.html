<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 300px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
  }
  .header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 16px;
    background: linear-gradient(135deg, #6C5CE7, #A29BFE);
  }
  .header svg { flex-shrink: 0; }
  .header h1 { font-size: 15px; font-weight: 600; color: #fff; }
  .header p { font-size: 11px; color: rgba(255,255,255,0.8); margin-top: 2px; }

  .status {
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .dot {
    width: 8px; height: 8px; border-radius: 50%; background: #555; flex-shrink: 0;
  }
  .dot.connected { background: #00E676; box-shadow: 0 0 6px #00E676; }
  .dot.error { background: #FF5252; }
  .dot.waiting { background: #FFC107; }

  .track-info {
    padding: 10px 16px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .track-title {
    font-size: 13px; font-weight: 500; color: #fff; margin-bottom: 3px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .track-artist { font-size: 11px; color: #999; }

  .hint-box {
    padding: 12px 16px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .hint-box p {
    font-size: 12px;
    line-height: 1.6;
    color: #ccc;
    margin-bottom: 8px;
  }
  .hint-box p:last-child { margin-bottom: 0; }
  .hint-box code {
    background: rgba(255,255,255,0.08);
    padding: 1px 5px; border-radius: 3px;
    font-size: 11px; color: #A29BFE;
  }

  .steps { padding: 12px 16px; }
  .steps-title {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px;
    color: #888; margin-bottom: 8px;
  }
  .step {
    display: flex; gap: 10px; padding: 6px 0; font-size: 12px; line-height: 1.5;
  }
  .step-num {
    flex-shrink: 0; width: 20px; height: 20px; border-radius: 50%;
    background: #6C5CE7; color: #fff; display: flex; align-items: center;
    justify-content: center; font-size: 11px; font-weight: 600;
  }
  .step.done .step-num { background: #00E676; color: #1a1a2e; }
  .step-text { padding-top: 1px; }
  .step-text code {
    background: rgba(255,255,255,0.08);
    padding: 1px 5px; border-radius: 3px;
    font-size: 11px; color: #A29BFE;
  }

  .obs-link {
    padding: 10px 16px;
    border-top: 1px solid rgba(255,255,255,0.08);
  }
  .obs-link label {
    display: block;
    font-size: 11px;
    color: #888;
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .obs-link .link-row {
    display: flex; gap: 6px; align-items: center;
  }
  .obs-link .link-url {
    flex: 1;
    padding: 8px 12px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 6px;
    font-size: 12px;
    color: #A29BFE;
    font-family: 'Consolas', monospace;
    user-select: all;
  }
  .obs-link .copy-btn {
    padding: 8px 14px;
    border: none;
    border-radius: 6px;
    background: #6C5CE7;
    color: #fff;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s;
    white-space: nowrap;
  }
  .obs-link .copy-btn:hover { background: #7c6cf7; }
  .obs-link .copy-btn.copied { background: #00E676; color: #1a1a2e; }
</style>
</head>
<body>
  <div class="header">
    <svg width="28" height="28" viewBox="0 0 128 128">
      <defs>
        <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#6C5CE7"/>
          <stop offset="100%" style="stop-color:#A29BFE"/>
        </linearGradient>
      </defs>
      <circle cx="64" cy="64" r="60" fill="url(#bg)"/>
      <circle cx="42" cy="78" r="10" fill="#fff"/>
      <circle cx="42" cy="78" r="4" fill="#6C5CE7"/>
      <rect x="38" y="30" width="4" height="48" rx="2" fill="#fff"/>
      <path d="M42 30 L80 22 L80 26 L42 34Z" fill="#fff"/>
      <circle cx="80" cy="68" r="10" fill="#fff"/>
      <circle cx="80" cy="68" r="4" fill="#6C5CE7"/>
      <rect x="76" y="22" width="4" height="46" rx="2" fill="#fff"/>
    </svg>
    <div>
      <h1>Music Widget Bridge</h1>
      <p>v4.0 — трансляция музыки в OBS</p>
    </div>
  </div>

  <div class="status">
    <span class="dot" id="statusDot"></span>
    <span id="statusText">Проверка...</span>
  </div>

  <div class="track-info" id="trackInfo" style="display:none;">
    <div class="track-title" id="trackTitle">—</div>
    <div class="track-artist" id="trackArtist">—</div>
  </div>

  <div class="hint-box" id="hintBox" style="display:none;">
    <p id="hintText"></p>
  </div>

  <div class="steps">
    <div class="steps-title">Как запустить</div>
    <div class="step" id="step1">
      <div class="step-num">1</div>
      <div class="step-text">Запусти сервер: <code>music-widget-obs\launch.vbs</code> (<code>stop.bat</code> - остановить, <code>restart.bat</code> - перезапустить)</div>
    </div>
    <div class="step" id="step2">
      <div class="step-num">2</div>
      <div class="step-text">Включи <strong>музыку</strong> в браузере</div>
    </div>
    <div class="step" id="step4">
      <div class="step-num">3</div>
      <div class="step-text">В OBS: Browser Source → скопируй ссылку ниже</div>
    </div>
  </div>

  <div class="obs-link">
    <label>Ссылка для OBS Browser Source</label>
    <div class="link-row">
      <input type="text" class="link-url" id="linkUrl" value="http://127.0.0.1:9876" readonly>
      <button class="copy-btn" id="copyBtn">Копировать</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
