<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Music Widget</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, 'Segoe UI', Arial, sans-serif;
            background: transparent;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        .widget {
            display: none;
            width: 100%;
            height: 100%;
            position: relative;
            border-radius: calc(12vh);
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 4px 24px rgba(0,0,0,0.5);
            animation: fadeIn 0.3s ease;
            transition: background 1s ease;
            overflow: hidden;
            text-shadow: 0 1px 4px rgba(0,0,0,0.6), 0 0 12px rgba(0,0,0,0.4);
        }

        .widget.active { display: flex; }

        /* ===== КОМПАКТНЫЙ СТИЛЬ ===== */
        .widget.compact .track-album { display: none; }
        .widget.compact .timing { display: none; }
        .widget.h.compact .track-title { font-size: calc(40vh); line-height: 1.25; }
        .widget.h.compact .track-artist { font-size: calc(26vh); line-height: 1.25; }
        .widget.v.compact .track-title { font-size: calc(18vh); line-height: 1.1; }
        .widget.v.compact .track-artist { font-size: calc(12vh); line-height: 1.1; }
        .widget.h.compact .state-btn { width: calc(38vh); height: calc(38vh); }
        .widget.v.compact .state-btn { width: calc(30vh); height: calc(30vh); }

        /* ===== ГОРИЗОНТАЛЬНЫЙ ===== */
        .widget.h {
            flex-direction: row;
            align-items: stretch;
        }

        .widget.h .artwork-wrap {
            width: 28%;
            min-width: calc(20vh);
            position: relative;
            overflow: hidden;
        }

        .widget.h .track-info {
            display: flex;
            flex-direction: row;
            align-items: center;
            flex: 1;
            min-width: 0;
            padding: calc(1vh) calc(2.5vh) calc(1vh) calc(5vh);
            gap: 0;
            overflow: hidden;
        }

        .widget.h .track-info-text {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: calc(0.6vh);
            min-width: 0;
            overflow: hidden;
        }

        .widget.h .controls {
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0 calc(8vh);
        }

        .widget.h .timing {
            font-size: calc(12vh);
            white-space: nowrap;
        }

        .widget.h .state-btn {
            width: calc(35vh);
            height: calc(35vh);
        }

        /* ===== ВЕРТИКАЛЬНЫЙ ===== */
        .widget.v {
            flex-direction: column;
            border-radius: calc(4vh);
        }

        .widget.v .progress-wrap {
            border-radius: 0 0 calc(4vh) calc(4vh);
        }

        .widget.v .artwork-wrap {
            flex: none;
            height: 50%;
            max-height: 50%;
            position: relative;
            overflow: hidden;
        }

        .widget.v .track-info {
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
            padding: calc(1vh) calc(1.5vh);
            gap: calc(0.6vh);
            overflow: hidden;
        }

        .widget.v .track-info-text {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: calc(0.6vh);
            overflow: hidden;
        }

        .widget.v .controls {
            display: none;
        }

        .widget.v .state-btn {
            width: calc(10vh);
            height: calc(10vh);
        }

        /* Прогресс-бар — внизу всего виджета */
        .progress-wrap {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: calc(3vh);
            background: rgba(255,255,255,0.1);
            border-radius: 0 0 calc(12vh) calc(12vh);
            overflow: hidden;
        }

        .widget.h .progress-wrap {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: calc(6vh);
        }

        .widget.v .progress-wrap {
            position: relative;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--accent-1, #8b5cf6), var(--accent-2, #06b6d4));
            transition: width 1s linear;
        }

        .progress-fill.paused { opacity: 0.35; }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.97); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Обложка */
        .artwork {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        .artwork.visible { display: block; }

        .artwork-bg {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.04);
        }

        .artwork-bg.hidden { display: none; }

        .artwork-bg svg {
            width: 40%;
            height: 40%;
            opacity: 0.15;
            fill: rgba(255,255,255,0.6);
        }

        /* Текст */
        .track-title-wrap,
        .track-artist-wrap,
        .track-album-wrap {
            overflow: hidden;
            white-space: nowrap;
            position: relative;
        }

        .track-title-wrap .marquee-inner,
        .track-artist-wrap .marquee-inner,
        .track-album-wrap .marquee-inner {
            display: inline-block;
            will-change: transform;
        }

        .track-title-wrap .marquee-inner.active,
        .track-artist-wrap .marquee-inner.active,
        .track-album-wrap .marquee-inner.active {
            animation: marquee var(--marquee-duration, 12s) linear 1 forwards;
        }

        .track-title-wrap .marquee-inner span,
        .track-artist-wrap .marquee-inner span,
        .track-album-wrap .marquee-inner span {
            display: inline-block;
            padding-right: 3em;
        }

        /* Анимация: бесконечная прокрутка влево */
        @keyframes marquee {
            0%   { transform: translate3d(0, 0, 0); }
            100% { transform: translate3d(-50%, 0, 0); }
        }

        .track-title {
            font-weight: 700;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
        }

        .widget.h .track-title { font-size: calc(22vh); line-height: 1.25; }
        .widget.v .track-title { font-size: calc(10vh); line-height: 1.25; }

        .track-artist {
            font-weight: 500;
            color: rgba(255,255,255,0.7);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .widget.h .track-artist { font-size: calc(14vh); line-height: 1.25; }
        .widget.v .track-artist { font-size: calc(6vh); line-height: 1.25; }

        .timing {
            color: rgba(255,255,255,0.5);
            font-variant-numeric: tabular-nums;
            font-weight: 600;
            letter-spacing: 0.02em;
            line-height: 1.25;
            white-space: nowrap;
        }

        .widget.v .timing { font-size: calc(3.5vh); line-height: 1.25; }

        .track-album {
            color: rgba(255,255,255,0.35);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.25;
        }

        .widget.h .track-album { font-size: calc(14vh); }
        .widget.v .track-album { font-size: calc(4vh); }

        /* Кнопка play/pause */
        .state-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.8);
            border-radius: 50%;
            background: rgba(255,255,255,0.08);
            transition: background 0.2s;
            flex-shrink: 0;
        }

        .state-btn:hover {
            background: rgba(255,255,255,0.15);
        }

        .state-btn svg {
            width: 45%;
            height: 45%;
        }

        /* Пустое состояние */
        .widget.no-track .artwork-wrap { display: none; }

        .widget.no-track .track-artist-wrap,
        .widget.no-track .track-album-wrap,
        .widget.no-track .timing,
        .widget.no-track .controls,
        .widget.no-track .progress-wrap {
            display: none;
        }

        .widget.no-track .track-info {
            justify-content: center;
            align-items: center;
        }

        .widget.no-track .track-info-text {
            justify-content: center;
            align-items: center;
            flex: none;
        }

        .widget.no-track .track-title-wrap {
            overflow: visible;
        }

        .widget.no-track .track-title {
            text-overflow: clip;
            overflow: visible;
            white-space: normal;
            text-align: center;
        }

        .widget.glass {
            background: transparent !important;
            border: 3px solid rgba(220,235,255,0.25);
            box-shadow:
                0 10px 40px rgba(0,0,0,0.35),
                inset 0 2px 0 rgba(180,220,255,0.45),
                inset 0 -2px 0 rgba(200,170,130,0.2),
                inset 2px 0 0 rgba(180,210,250,0.08),
                inset -2px 0 0 rgba(220,190,160,0.06);
            text-shadow: 0 2px 16px rgba(0,0,0,0.8);
            overflow: hidden;
        }

        /* Blurred artwork background */
        .widget.glass::before {
            content: '';
            position: absolute;
            inset: 0;
            z-index: 0;
            border-radius: inherit;
            background: var(--glass-artwork, none) center / cover no-repeat;
            filter: blur(40px) brightness(0.35) saturate(1.3);
            pointer-events: none;
        }

        /* Glass gradient overlay on top of blur */
        .widget.glass::after {
            content: '';
            position: absolute;
            inset: 0;
            z-index: 1;
            border-radius: inherit;
            background: linear-gradient(160deg,
                rgba(200,220,250,0.5) 0%,
                rgba(180,200,235,0.35) 35%,
                rgba(160,180,215,0.25) 65%,
                rgba(140,160,200,0.4) 100%);
            pointer-events: none;
        }

        /* Content above blur + overlay */
        .widget.glass .track-info,
        .widget.glass .controls {
            position: relative;
            z-index: 2;
        }
        .widget.glass .progress-wrap { z-index: 2; }

        .widget.glass .progress-fill {
            background: rgba(255,255,255,0.35);
        }

        .widget.glass .state-btn {
            background: rgba(255,255,255,0.15);
        }

        .widget.glass .state-btn:hover {
            background: rgba(255,255,255,0.25);
        }

        .widget.glass .track-artist {
            color: rgba(255,255,255,0.6);
        }

        .widget.glass .track-album {
            color: rgba(255,255,255,0.3);
        }

        .widget.glass .timing {
            color: rgba(255,255,255,0.45);
        }

        .widget.glass .artwork-bg {
            background: rgba(255,255,255,0.04);
        }

        /* ===== МИНИМАЛИСТИЧНЫЙ ===== */
        .widget.minimal {
            background: transparent !important;
            border: none !important;
            box-shadow: none !important;
        }
        .widget.minimal .artwork-wrap { display: none !important; }
        .widget.minimal .track-album-wrap { display: none !important; }
        .widget.minimal .timing { display: none !important; }
        .widget.minimal .controls { display: none !important; }
        .widget.minimal .progress-wrap { display: none !important; }

        .widget.minimal .track-info-text {
            justify-content: space-between;
            padding: calc(2vh) calc(4vh);
        }
        .widget.minimal .track-title {
            font-size: calc(32vh);
            line-height: 1.3;
        }
        .widget.minimal .track-artist {
            font-size: calc(20vh);
            line-height: 1.3;
        }
        @font-face {
            font-family: 'Seven Segment';
            src: url('seven-segment.ttf') format('truetype');
        }

        /* ===== СТЕРЕО ===== */
        .widget.stereo {
            background: url('stereo-bg.png') center / contain no-repeat !important;
            border: none !important;
            box-shadow: none !important;
            text-shadow: none !important;
            border-radius: 0 !important;
            animation: none !important;
            transition: none !important;
        }
        .widget.stereo .artwork-wrap,
        .widget.stereo .track-info,
        .widget.stereo .controls,
        .widget.stereo .progress-wrap {
            display: none !important;
        }

        .widget.stereo .stereo-display {
            position: absolute;
            top: 27%;
            left: 3%;
            width: 75%;
            height: 16%;
            font-family: 'Seven Segment', monospace;
            font-size: calc(7vh);
            color: #ff2020;
            text-shadow: 0 0 12px rgba(255,0,0,0.9), 0 0 4px rgba(200,0,0,0.6);
            background: rgba(0,0,0,0.85);
            z-index: 10;
            display: flex;
            align-items: center;
            padding: 0 2%;
            letter-spacing: 0.15em;
            white-space: nowrap;
            overflow: hidden;
            border-radius: 2px;
        }

        #colorAnalyzer { display: none; }
    </style>
</head>
<body>
    <canvas id="colorAnalyzer" width="10" height="10" willReadFrequently></canvas>

    <div class="widget" id="widget">
        <div class="artwork-wrap">
            <img class="artwork" id="artwork" alt="" crossorigin="anonymous">
            <div class="artwork-bg" id="artwork-bg">
                <svg viewBox="0 0 24 24"><path d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6z"/></svg>
            </div>
        </div>

        <div class="track-info">
            <div class="track-info-text">
                <div class="track-title-wrap"><div class="track-title"><div class="marquee-inner" id="title"></div></div></div>
                <div class="track-artist-wrap"><div class="track-artist"><div class="marquee-inner" id="artist"></div></div></div>
                <div class="track-album-wrap"><div class="track-album"><div class="marquee-inner" id="album"></div></div></div>
                <div class="timing" id="timing"></div>
            </div>
            <div class="controls">
                <div class="state-btn" id="state-btn"></div>
            </div>
        </div>

        <div class="progress-wrap"><div class="progress-fill" id="progress"></div></div>
    </div>

    <script src="widget.js"></script>
</body>
</html>
