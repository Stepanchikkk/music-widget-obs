<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Music Widget</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: transparent; overflow: hidden; width: 100vw; height: 100vh; }
        .widget { display: none; width: 100%; height: 100%; position: relative; border-radius: calc(12vh); overflow: hidden; }
        .widget.active { display: flex; }
        .widget.no-track { justify-content: center; align-items: center; }
        .widget.h { flex-direction: row; align-items: stretch; }
        .widget.v { flex-direction: column; }
        .widget.v { border-radius: calc(5vh); }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.97); } to { opacity: 1; transform: scale(1); } }
        #colorAnalyzer { display: none; }
    </style>
</head>
<body>
    <canvas id="colorAnalyzer" width="10" height="10"></canvas>
    <div class="widget" id="widget"></div>

    <script src="styles/classic.js"></script>
    <script src="styles/compact.js"></script>
    <script src="styles/glass.js"></script>
    <script src="styles/minimal.js"></script>
    <script src="styles/stereo.js"></script>
    <script src="widget.js"></script>
</body>
</html>
